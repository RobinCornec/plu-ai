#--- HEALTH ---

#--- DEFINITIONS ---
components:
  parameters:
    pathGridName:
      name: gridName
      in: path
      required: true
      schema:
        type: string
      description: "Nom du maillage"
      example: "75"
    pathDocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-f0-9]{32}$'
      description: "Identifiant unique du document (32 caractères hexadécimaux)"
      example: "a1b2c3d4e5f6789012345678901234ab"
    gridName:
      name: gridName
      in: query
      schema:
        type: string
      description: "Nom du maillage"
    lon:
      name: lon
      in: query
      schema:
        type: number
        format: float
        minimum: -180
        maximum: 180
      description: "Longitude en degrés décimaux (WGS84)"
      example: 3.396492
    lat:
      name: lat
      in: query
      schema:
        type: number
        format: float
        minimum: -90
        maximum: 90
      description: "Latitude en degrés décimaux (WGS84)"
      example: 45.71445
    parcelId:
      name: parcelId
      in: query
      required: false
      schema:
        type: string
        pattern: '^[0-9]{2}_[0-9]{3}_[0-9]{3}_[0-9]{3}_[A-Z0-9]{2}_[0-9]{4}$'
      description: "Identifiant de parcelle au format [code_dep]_[code_com]_[code_arr]_[com_abs]_[section]_[numero]"
      example: "77_443_000_000_AB_0001"
    partition:
      name: partition
      in: query
      required: false
      schema:
        type: string
      description: Partition du document
    zone:
      name: zone
      in: query
      required: false
      schema:
        type: string
        enum: ["validation", "production"]
        default: "production"
      description: "Zone de données (validation pour les données en cours de validation, production pour les données validées)"
      example: "production"
    
    

  responses:

    # réponses génériques
    NotFound:
      description: "Ressource non trouvée"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Not Found"
              message:
                type: string
                example: "La ressource demandée n'existe pas"
              code:
                type: integer
                example: 404
    Unauthorized:
      description: "Accès non autorisé"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unauthorized"
              message:
                type: string
                example: "Authentification requise"
              code:
                type: integer
                example: 401
    InvalidRequest:
      description: "Requête invalide"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Bad Request"
              message:
                type: string
                example: "Paramètres de requête invalides"
              code:
                type: integer
                example: 400
              details:
                type: array
                items:
                  type: string
                example: ["Le paramètre 'id' est requis", "Format de date invalide"]
    TooManyRequests:
      description: "Limite de taux dépassée"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Too Many Requests"
              message:
                type: string
                example: "Limite de requêtes dépassée"
              code:
                type: integer
                example: 429
              retryAfter:
                type: integer
                description: "Nombre de secondes à attendre avant de réessayer"
                example: 60
    InternalServerError:
      description: "Erreur interne du serveur"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Internal Server Error"
              message:
                type: string
                example: "Une erreur interne s'est produite"
              code:
                type: integer
                example: 500
    Forbidden:
      description: "Accès interdit"
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Forbidden"
              message:
                type: string
                example: "Accès interdit à cette ressource"
              code:
                type: integer
                example: 403

  schemas:
    Document:
      type: object
      description: 'Document avec informations de base'
      required: [id, originalName, type, status, name, grid, uploadDate]
      properties:
        id:
          type: string
          pattern: '^[a-f0-9]{32}$'
          description: 'Identifiant unique généré par le GPU pour chaque téléversement (32 caractères hexadécimaux)'
          example: "a1b2c3d4e5f6789012345678901234ab"
        originalName:
          type: string
          pattern: '^[0-9]{5}_[A-Z]+_[0-9]{8}$'
          description: 'Nom original du dossier de téléversement'
          example: "77443_PLU_20171007"
        type:
          type: string
          enum: [POS, CC, PLU, PLUi, PSMV, SUP, SCoT]
          description: 'Type de document d''urbanisme'
          example: "PLU"
        supCategory:
          $ref: '#/components/schemas/SupCategorie'
        status:
          type: string
          description: 'État du document au sens des traitements et de la publication'
          example: "document.production"
        statusDate:
          type: string
          format: date-time
          description: 'Date et heure du dernier changement de statut (ISO 8601)'
          example: "2023-01-01T10:10:10Z"
        legalStatus:
          type: string
          enum: [APPROVED, PENDING, REJECTED, UNKNOWN]
          description: 'Statut légal (opposabilité) du document'
          example: "APPROVED"
        name:
          type: string
          description: Identifiant de la partition
        grid:
          $ref: '#/components/schemas/Grid'
        bbox:
          type: array
          description: 'Boîte englobante du document [minX, minY, maxX, maxY] en coordonnées WGS84'
          items:
            type: number
          minItems: 4
          maxItems: 4
          example: [2.9400784, 48.8624668, 2.9773633, 48.8920683]
        uploadDate:
          type: string
          format: date-time
          description: 'Date et heure de téléversement (ISO 8601)'
          example: "2023-01-01T10:10:10Z"
        updateDate:
          type: string
          format: date-time
          description: 'Date et heure de dernière mise à jour d''une propriété du document (ISO 8601)'
          example: "2023-01-01T10:10:10Z"
        fileIdentifier:
          type: string
          pattern: '^GPU-[a-f0-9]{32}$'
          description: 'Identifiant de la fiche de métadonnées'
          example: "GPU-a1b2c3d4e5f6789012345678901234ab"
      example:
        id: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        originalName: "77443_PLU_20171007"
        type: "PLU"
        supCategory: null
        status: "document.production"
        statusDate: "01/01/2023 10:10:10"
        legalStatus: "APPROVED"
        name: "DU_77443"
        bbox: [2.9400784,48.8624668,2.9773633,48.8920683]
        grid: {"name": "77443", "title": "SANCY", "type": "municipality", "rnu": false}
        documentSource: "UPLOAD"
        uploadDate: "01/01/2023 10:10:10"
        updateDate: "01/01/2023 10:10:10"
        legalControlStatus: 100

    DocumentWithDetails:
      allOf:
        - $ref: '#/components/schemas/Document'
        - type: object
        - description: 'Document avec informations détaillées'
        - properties:
            # informations additionnelles obtenues par jointure
            statusDate:
              type: string
              description: Date de dernier changement de statut
              format: date-time
            # informations additionnelles obtenues sur l'entrepot (document.json)
            typeref:
              type: string
              description: 'Nom du référentiel cadastral utilisé pour la numérisation (01,02)'
            files:
              type: array
              description: 'Liste des pièces écrites du document (nom court)'
              items:
                type: string
            metadata:
              type: string
              description: 'Identifiant de la données dans la fiche de métadonnées'
            protected:
              type: boolean
              description: Indique si le document est téléchargeable (SUP protégées)
            writingMaterials:
              type: object
              description: 'URL des pièces écrites du document (clé : nom court, valeur: URL)'
            archiveUrl:
              type: string
              description: URL de téléchargement de l'archive
      example:
        id: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        originalName: "77443_PLU_20171007"
        type: "PLU"
        supCategory: null
        status: "document.production"
        statusDate: "01/01/2023 10:10:10"
        legalStatus: "APPROVED"
        name: "DU_77443"
        bbox: [2.9400784,48.8624668,2.9773633,48.8920683]
        grid: {"name": "77443", "title": "SANCY" , "type": "municipality", "rnu": false}
        documentSource: "UPLOAD"
        uploadDate: "01/01/2023 10:10:10"
        updateDate: "01/01/2023 10:10:10"
        legalControlStatus: 100
        title: "Plan Local d'Urbanisme (PLU) de la commune de SANCY"
        fileIdentifier: "GPU-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
        projectionCode: "EPSG:2154"
        files: ["77443_procedure_20171007.pdf","77443_rapport_20171007.pdf"]
        metadata: "fr-000077443-PLU20171007"
        producer: "Mairie de Sancy-les-Meaux"
        writingMaterials: {
          "77443_procedure_20171007.pdf": "https://.../77443_procedure_20171007.pdf","77443_rapport_20171007.pdf": "https://.../77443_rapport_20171007.pdf"}
        protected: false,
        archiveUrl: "https://.../77443_PLU_20171007.zip"

    DocumentFileInfo:
      description: 'Informations sur une pièce écrite du document'
      properties:
        name:
          type: string
          description: 'Nom du fichier'
        title:
          type: string
          description: 'Titre de la pièce écrite'
        path:
          type: string
          description: 'Répertoire de la pièce écrite'
      example:
        name: "50213_rapport_20050707.pdf"
        title: "Rapport"
        path: "Rapport de présentation"

    Feature:
      type: object
      description: GeoJSON Feature
      properties:
        id:
          type: string
          example: "document.1715"
        type:
          type: string
          example: Feature
        geometry:
          type: string
          example: null
        properties:
          type: object
          properties:
            gid:
              type: string
            partition:
              type: string
            additionalProperties:
              type: string
          required:
            - gid
            - partition
          example:
            gid: 1715,
            id: "725489d1d2dc00f465008d01f1ac64d6"
            grid_name: "200067627"
            grid_title: "PLUI BILLOM COMMUNAUTE"
            name: "200067627_PLUi_20191021"
            partition: "DU_200067627"
            du_type: "PLUi"
            bbox: [357222.6944, 5719037.9423, 391318.2156, 5755149.6517]

    FeatureCollection:
      type: object
      description: GeoJSON FeatureCollection
      properties:
        type:
          type: string
          example: FeatureCollection
        totalFeatures:
          type: integer
          example: 1
          description: Nombre de résultats
        features:
          type: array
          items:
            $ref: '#/components/schemas/Feature'

    Grid:
      type: object
      description: 'Territoire géographique (commune, département, etc.)'
      required: [name, title]
      properties:
        name:
          type: string
          description: 'Code du territoire'
        title:
          type: string
          description: 'Nom officiel du territoire'
          example: "SANCY"
        type:
          type: string
          enum: [state, region, departement, municipality, epci, scot]
          description: 'Type de territoire'
          example: "municipality"
        rnu:
          type: boolean
          description: 'Indique si le territoire est en zone RNU (Règlement National d''Urbanisme)'
          example: false
        coastline:
          type: boolean
          description: 'Indique si le territoire est sur la côte'
          example: false
        approved:
          type: boolean
          description: 'Indique si le territoire a un document approuvé'
          example: false
      example:
        name: "77443"
        title: "SANCY"
        type: "municipality"
        rnu: false
        coastline: false
        approved: false
    Projection:
      description: 'Projection'
      properties:
        code:
          type: string
          description: 'Le code de la projection (ex : "EPSG:2154")'
        validityDomain:
          type: string
          description: 'Le domaine de validité au format WKT'
        title:
          type: string
          description: 'Titre de la projection'
        uri:
          type: string
          format: uri
          description: 'Uri de la projection'
        codeGeotool:
          type: boolean
          description: 'Code géotools de la projection'
      example:
        code: "EPSG:2154"
        validityDomain: "POLYGON((60000 6010000,60000 7130000,1270000 7130000,1270000 6010000,60000 6010000))"
        title: "RGF93 / Lambert-93 (EPSG)"
        uri: "http://www.opengis.net/def/crs/EPSG/0/2154"
        codeGeotool: null

    Procedure:
      type: object
      description: 'Procédure avec informations de base'
      required: [id, name, documentType, documentName, procedureType, grid]
      properties:
        id:
          type: string
          pattern: '^[a-f0-9]{32}$'
          description: 'Identifiant unique généré par le GPU pour chaque nouvelle procédure'
          example: "a1b2c3d4e5f6789012345678901234ab"
        name:
          type: string
          pattern: '^[0-9]{5}_[A-Z]+_[A-Z0-9]+_[0-9]{8}$'
          description: 'Nom de la procédure au format [code_insee]_[type_doc]_[type_proc]_[date]'
          example: "95197_PLU_M1_20200121"
        documentType:
          type: string
          enum: [PLU, POS, CC, PLUi, PSMV, SCoT]
          description: 'Type du document lié à la procédure'
          example: "PLU"
        documentName:
          type: string
          pattern: '^[0-9]{5}_[A-Z]+_[0-9]{8}$'
          description: 'Nom du document lié à la procédure'
          example: "95197_PLU_20200121"
        procedureType:
          type: string
          enum: [E, R, RA, M, MS, MEC, MAJ]
          description: 'Type de procédure selon le standard CNIG'
          example: "M"
        approbationDate:
          type: string
          format: date-time
        inseeOrSiren:
          $ref: '#/components/schemas/Grid'

      example:
        id: "a1b2c3d4e5f6789012345678901234ab"
        name: "95197_PLU_M1_20200121"
        documentType: "PLU"
        documentName: "95197_PLU_20200121"
        approbationDate: "2023-01-01T10:10:10Z"
        grid: {
          "name": "95197",
          "title": "DEUIL-LA-BARRE"
          }
        procedureType: {
          "name": "M",
          "title": "Modification de droit commun n°1",
          "number": "1",
          "standardised": true,
          }
        files: [{
            "name": "95197_20240208_délibération_M1_20200121.pdf",
            "date": "08/02/2024",
            "acteType": {
              "name": "delib_approbation_M",
              "title": "Délibération d’approbation de modification",
              "standardised": true
            },
            "title": "Délibération d’approbation de modification validé le 8 février 2024"
          }]

    DocumentModelSummary:
      type: object
      description: "Résumé d'un modèle de document (standard)"
      properties:
        id:
          type: integer
          description: 'Identifiant unique du modèle'
        name:
          type: string
          description: 'Nom du modèle (ex: cnig_PLU_2013)'
        title:
          type: string
          description: 'Titre du modèle'
        description:
          type: string
          description: 'Description du modèle'
        abstract:
          type: boolean
          description: 'Indique si le modèle est abstrait'
        type:
          type: string
          description: 'Type de document extrait du nom (PLU, POS, CC, etc.)'
        parent:
          type: object
          description: "Modèle parent s'il existe"
          properties:
            id:
              type: integer
              description: 'Identifiant du modèle parent'
            name:
              type: string
              description: 'Nom du modèle parent'
      example:
        id: 1
        name: "cnig_PLU_2013"
        title: "Plan Local d'Urbanisme"
        description: "Modèle CNIG pour les PLU"
        abstract: false
        type: "PLU"
        parent:
          id: 2
          name: "cnig_PLU_2012"

    DocumentModel:
      type: object
      description: 'Modèle de document complet avec tous ses détails'
      properties:
        id:
          type: integer
          description: 'Identifiant unique du modèle'
        name:
          type: string
          description: 'Nom du modèle'
        title:
          type: string
          description: 'Titre du modèle'
        description:
          type: string
          description: 'Description du modèle'
        abstract:
          type: boolean
          description: 'Indique si le modèle est abstrait'
        parent:
          type: object
          description: "Modèle parent s'il existe"
          properties:
            id:
              type: integer
            name:
              type: string
        featureTypes:
          type: array
          description: 'Liste des types de features (tables) du modèle'
          items:
            $ref: '#/components/schemas/FeatureType'
      example:
        id: 1
        name: "cnig_PLU_2013"
        title: "Plan Local d'Urbanisme"
        description: "Modèle CNIG pour les PLU"
        abstract: false
        parent:
          id: 2
          name: "cnig_PLU_2012"
        featureTypes:
          - name: "DOC_URBA_COM"
            title: "Document d'urbanisme communal"

    FeatureType:
      type: object
      description: 'Type de feature (table) dans un modèle de document'
      properties:
        name:
          type: string
          description: 'Nom du type de feature'
        title:
          type: string
          description: 'Titre du type de feature'
        description:
          type: string
          description: 'Description du type de feature'
        attributes:
          type: array
          description: 'Liste des attributs du type de feature'
          items:
            $ref: '#/components/schemas/AttributeType'
      example:
        name: "DOC_URBA_COM"
        title: "Document d'urbanisme communal"
        description: "Table des documents d'urbanisme communaux"
        attributes:
          - name: "ID_DOC_URBA"
            title: "Identifiant du document"
            type: "string"

    AttributeType:
      type: object
      description: "Type d'attribut dans un type de feature"
      properties:
        name:
          type: string
          description: "Nom de l'attribut"
        title:
          type: string
          description: "Titre de l'attribut"
        type:
          type: string
          description: "Type de données de l'attribut"
        description:
          type: string
          description: "Description de l'attribut"
      example:
        name: "ID_DOC_URBA"
        title: "Identifiant du document"
        type: "string"
        description: "Identifiant unique du document d'urbanisme"

    SupCategorie:
      description: 'Catégorie de SUP'
      properties:
        name:
          type: string
          description: 'Nom de la catégorie'
        libelle:
          type: string
          description: 'Libelle de la catégorie'
        libelleCourt:
          type: string
          description: 'Libelle court de la catégorie'
        downloadable:
          type: boolean
          description: 'Indique si le document est téléchargeable (SUP protégées)'
        urlFiche:
          type: string
          description: 'Url de la fiche'
      example:
        name: "T7"
        libelle: "Servitudes établies à l'extérieur des zones de dégagement"
        libelleCourt: "Extérieur des zones de dégagement"
        downloadable: true
        urlFiche: "http://...."

    DuCategorie:
      description: 'Catégorie de DU'
      properties:
        type:
          type: string
          description: 'Type de la catégorie'
        code:
          type: string
          description: 'Code de la catégorie'
        sous_code:
          type: string
          description: 'Sous-code de la catégorie'
        libelong:
          type: boolean
          description: 'Libelle de la catégorie'
      example:
        type: "prescription"
        code: "01"
        sous_code: "00"
        libelong: "Espace boisé classé"


